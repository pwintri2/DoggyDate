<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Services · Doggy Date 🐾</title>
  <meta name="description" content="Double Dog Walk, Bring Your Pup, or Rent-a-Pupper. Choose your Doggy Date style — every date supervised, treat-filled, and tail-wag optimised.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="services">
  <a class="skip-link" href="#main" data-i18n="nav.skip">Skip to content</a>

  <header class="site-header">
    <div class="container site-header__inner">
      <a href="index.html" class="brand">🐾 Doggy Date</a>
      <nav class="nav" aria-label="Primary">
        <a href="index.html" data-i18n="nav.home"></a>
        <a href="services.html" aria-current="page" data-i18n="nav.services"></a>
        <a href="how-it-works.html" data-i18n="nav.how"></a>
        <a href="guarantee.html" data-i18n="nav.guarantee"></a>
      </nav>
      <div class="header-actions">
        <div class="lang-toggle" role="group" aria-label="Language / Taal">
          <button type="button" data-lang="en" aria-pressed="false">EN</button>
          <button type="button" data-lang="nl" aria-pressed="false">NL</button>
        </div>
        <button type="button" class="btn hide-on-mobile" data-book data-service="walk" data-i18n="nav.book"></button>
        <button type="button" class="nav-burger" data-burger aria-expanded="false" aria-controls="mobileNav" data-i18n-aria="nav.menu" aria-label="Menu">☰</button>
      </div>
    </div>
    <div class="container">
      <nav class="mobile-nav" id="mobileNav" data-mobile-nav aria-label="Mobile">
        <a href="index.html" data-i18n="nav.home"></a>
        <a href="services.html" aria-current="page" data-i18n="nav.services"></a>
        <a href="how-it-works.html" data-i18n="nav.how"></a>
        <a href="guarantee.html" data-i18n="nav.guarantee"></a>
        <button type="button" class="btn" data-book data-service="walk" data-i18n="nav.book"></button>
      </nav>
    </div>
  </header>

  <main id="main" tabindex="-1">
    <section class="section" id="services">
      <div class="container">
        <div class="section-head">
          <span class="eyebrow" data-i18n="services.eyebrow"></span>
          <h2 data-i18n="services.title"></h2>
          <p data-i18n="services.subtitle"></p>
        </div>

        <div class="grid grid--3">
          <!-- Card 1 — Double Dog Walk -->
          <article class="card">
            <span class="card__tag" data-i18n="svc.walk.tag"></span>
            <span class="card__emoji" aria-hidden="true">🐕🤝🐕</span>
            <h3 data-i18n="svc.walk.title"></h3>
            <p class="card__desc" data-i18n="svc.walk.desc"></p>
            <ul class="perks">
              <li data-i18n="svc.walk.perk1"></li>
              <li data-i18n="svc.walk.perk2"></li>
              <li data-i18n="svc.walk.perk3"></li>
            </ul>
            <div class="card__foot">
              <p class="price"><span data-i18n="svc.walk.price"></span> <small data-i18n="svc.walk.unit"></small></p>
              <button type="button" class="btn btn--block" data-book data-service="walk" data-i18n="services.book"></button>
            </div>
          </article>

          <!-- Card 2 — Bring Your Pup -->
          <article class="card card--brown">
            <span class="card__tag" data-i18n="svc.pup.tag"></span>
            <span class="card__emoji" aria-hidden="true">🧑‍🤝‍🧑🐶</span>
            <h3 data-i18n="svc.pup.title"></h3>
            <p class="card__desc" data-i18n="svc.pup.desc"></p>
            <ul class="perks">
              <li data-i18n="svc.pup.perk1"></li>
              <li data-i18n="svc.pup.perk2"></li>
              <li data-i18n="svc.pup.perk3"></li>
            </ul>
            <div class="card__foot">
              <p class="price"><span data-i18n="svc.pup.price"></span> <small data-i18n="svc.pup.unit"></small></p>
              <button type="button" class="btn btn--brown btn--block" data-book data-service="pup" data-i18n="services.book"></button>
            </div>
          </article>

          <!-- Card 3 — Rent-a-Pupper -->
          <article class="card card--green">
            <span class="card__tag" data-i18n="svc.rent.tag"></span>
            <span class="card__emoji" aria-hidden="true">🏠🐕</span>
            <h3 data-i18n="svc.rent.title"></h3>
            <p class="card__desc" data-i18n="svc.rent.desc"></p>
            <ul class="perks">
              <li data-i18n="svc.rent.perk1"></li>
              <li data-i18n="svc.rent.perk2"></li>
              <li data-i18n="svc.rent.perk3"></li>
            </ul>
            <div class="card__foot">
              <p class="price"><span data-i18n="svc.rent.price"></span> <small data-i18n="svc.rent.unit"></small></p>
              <button type="button" class="btn btn--green btn--block" data-book data-service="rent" data-i18n="services.book"></button>
            </div>
          </article>
        </div>
      </div>
    </section>

    <section class="section" style="padding-top:0">
      <div class="container">
        <div class="cta-banner">
          <h2 data-i18n="how.cta.title"></h2>
          <p data-i18n="home.cta.subtitle"></p>
          <a class="btn btn--lg" href="how-it-works.html" data-i18n="how.cta.button"></a>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="main" data-i18n="footer.main"></p>
      <p class="sub" data-i18n="footer.sub"></p>
      <p class="legal" data-i18n="footer.legal"></p>
    </div>
  </footer>

  <script src="js/i18n.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
